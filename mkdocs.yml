plugins:
- search
- meta
repo_name: CorpusIQ/corpusiq-docs
repo_url: https://github.com/CorpusIQ/corpusiq-docs
site_description: CorpusIQ connects your business tools to ChatGPT, Claude, and Perplexity via MCP. Read-only, cited answers across your data stack. No data moved or stored.
site_name: CorpusIQ Docs
site_url: https://www.corpusiq.io/docs/
theme:
  custom_dir: docs/overrides
  features:
  - navigation.sections
  - navigation.expand
  - navigation.indexes
  - search.suggest
  - search.highlight
  - content.code.copy
  name: material
  palette:
  - accent: custom
    primary: custom
    scheme: default
    toggle:
      icon: material/brightness-7
      name: Switch to dark mode
  - accent: custom
    primary: custom
    scheme: slate
    toggle:
      icon: material/brightness-4
      name: Switch to light mode
use_directory_urls: false
