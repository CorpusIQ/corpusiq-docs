edit_uri: edit/main/docs/
extra_css:
- stylesheets/extra-v2.css
extra_javascript:
- javascripts/hermes-nav.js?v=2
# Rewrites the theme's page-relative asset URLs (assets/, javascripts/,
# stylesheets/) to absolute /docs/-rooted paths at build time. Required because
# the site is served under /docs/ with trailing-slash stripping, which makes a
# no-slash request like /docs resolve relative assets against the domain root
# and 404. See hooks/absolute_asset_urls.py for the full explanation.
hooks:
- hooks/absolute_asset_urls.py
- scripts/hooks/auto_link_children.py
- scripts/hooks/truncate_meta_description.py
markdown_extensions:
- admonition
- pymdownx.details
- pymdownx.superfences
- pymdownx.highlight
- pymdownx.inlinehilite
- pymdownx.tabbed:
    alternate_style: true
- tables
- toc:
    permalink: true
    permalink_title: Anchor link to this section
