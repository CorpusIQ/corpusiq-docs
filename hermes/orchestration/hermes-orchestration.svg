<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600" font-family="monospace">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#00b4d8"/></marker>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#0a1628"/><stop offset="100%" style="stop-color:#0d1f3c"/></linearGradient>
  </defs>

  <rect width="1200" height="1600" fill="url(#bg)"/>

  <!-- TITLE -->
  <text x="600" y="50" text-anchor="middle" fill="#00b4d8" font-size="22" font-weight="bold">Hermes Agent — Task Orchestration &amp; Subagent Fleet</text>
  <line x1="400" y1="60" x2="800" y2="60" stroke="#00b4d8" stroke-width="0.5" opacity="0.5"/>

  <!-- ===== MAIN FLOW (top) ===== -->
  <!-- TASK ARRIVES -->
  <rect x="50" y="90" width="140" height="50" rx="8" fill="none" stroke="#00b4d8" stroke-width="1.5"/>
  <text x="120" y="120" text-anchor="middle" fill="#fff" font-size="13">TASK ARRIVES</text>

  <!-- Arrow -->
  <line x1="190" y1="115" x2="240" y2="115" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- DECISION diamond -->
  <polygon points="360,90 420,115 360,140 300,115" fill="none" stroke="#00b4d8" stroke-width="1.5"/>
  <text x="360" y="112" text-anchor="middle" fill="#f0c040" font-size="12">DECISION</text>
  <text x="360" y="126" text-anchor="middle" fill="#6688aa" font-size="9">What shape is this task?</text>

  <!-- Arrow -->
  <line x1="420" y1="115" x2="470" y2="115" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- GOVERNANCE hexagon -->
  <polygon points="590,95 620,105 620,125 590,135 560,125 560,105" fill="none" stroke="#f0c040" stroke-width="1.5"/>
  <text x="590" y="112" text-anchor="middle" fill="#f0c040" font-size="11">GOVERNANCE</text>
  <text x="590" y="125" text-anchor="middle" fill="#6688aa" font-size="8">Permission·Scope·Intent</text>

  <!-- Arrow -->
  <line x1="620" y1="115" x2="670" y2="115" stroke="#f0c040" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- EXECUTION ROUTE splitter -->
  <rect x="670" y="95" width="130" height="40" rx="6" fill="none" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="735" y="119" text-anchor="middle" fill="#2ecc71" font-size="12">ROUTE</text>

  <!-- Lines to 4 paths -->
  <line x1="735" y1="135" x2="735" y2="180" stroke="#2ecc71" stroke-width="1"/>
  <line x1="735" y1="180" x2="100" y2="180" stroke="#00b4d8" stroke-width="0.5"/>
  <line x1="735" y1="180" x2="1100" y2="180" stroke="#00b4d8" stroke-width="0.5"/>

  <!-- ===== FOUR EXECUTION PATHS ===== -->
  <!-- PATH 1: DIRECT -->
  <rect x="80" y="195" width="240" height="100" rx="8" fill="#0a1e33" stroke="#00b4d8" stroke-width="1.5"/>
  <text x="200" y="220" text-anchor="middle" fill="#00b4d8" font-size="14" font-weight="bold">Direct Tool Call</text>
  <text x="200" y="242" text-anchor="middle" fill="#8899aa" font-size="10">Single tool call gives the answer</text>
  <text x="200" y="258" text-anchor="middle" fill="#66aacc" font-size="10">No loop · Inspect directly</text>
  <rect x="95" y="268" width="210" height="20" rx="4" fill="#1a0a0a" stroke="#cc3333" stroke-width="0.5"/>
  <text x="200" y="282" text-anchor="middle" fill="#cc6666" font-size="8">AVOID: 3+ chained calls with logic</text>

  <!-- PATH 2: execute_code -->
  <rect x="380" y="195" width="240" height="100" rx="8" fill="#0a1e33" stroke="#7b2d8e" stroke-width="1.5"/>
  <text x="500" y="220" text-anchor="middle" fill="#a855f7" font-size="14" font-weight="bold">execute_code</text>
  <text x="500" y="242" text-anchor="middle" fill="#8899aa" font-size="10">Scripting · Looping · Parsing</text>
  <text x="500" y="258" text-anchor="middle" fill="#aa77cc" font-size="10">Filter · Transform · Summarize</text>
  <rect x="395" y="268" width="210" height="20" rx="4" fill="#1a0a1a" stroke="#cc66cc" stroke-width="0.5"/>
  <text x="500" y="282" text-anchor="middle" fill="#cc99cc" font-size="8">AVOID: Needs reasoning between steps</text>

  <!-- PATH 3: delegate -->
  <rect x="680" y="195" width="240" height="100" rx="8" fill="#0a1e33" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="800" y="220" text-anchor="middle" fill="#2ecc71" font-size="14" font-weight="bold">delegate_task</text>
  <text x="800" y="242" text-anchor="middle" fill="#8899aa" font-size="10">Independent reasoning · Review</text>
  <text x="800" y="258" text-anchor="middle" fill="#66cc88" font-size="10">Debug · Research · Parallel</text>
  <rect x="695" y="268" width="210" height="20" rx="4" fill="#1a1a0a" stroke="#ccaa33" stroke-width="0.5"/>
  <text x="800" y="282" text-anchor="middle" fill="#ccaa66" font-size="8">AVOID: User interaction needed</text>

  <!-- PATH 4: cron -->
  <rect x="980" y="195" width="190" height="100" rx="8" fill="#0a1e33" stroke="#f0c040" stroke-width="1.5"/>
  <text x="1075" y="220" text-anchor="middle" fill="#f0c040" font-size="14" font-weight="bold">cronjob / bg</text>
  <text x="1075" y="242" text-anchor="middle" fill="#8899aa" font-size="10">Recurring · Schedule</text>
  <text x="1075" y="258" text-anchor="middle" fill="#ccaa44" font-size="10">Monitor · Watchdog</text>
  <rect x="995" y="268" width="160" height="20" rx="4" fill="#1a0a0a" stroke="#cc3333" stroke-width="0.5"/>
  <text x="1075" y="282" text-anchor="middle" fill="#cc6666" font-size="8">AVOID: Result needed now</text>

  <!-- Decision logic line -->
  <text x="600" y="325" text-anchor="middle" fill="#5577aa" font-size="10" font-style="italic">One call? → Direct  |  Looping/parsing? → execute_code  |  Reasoning? → delegate  |  Survives restart? → cron/bg</text>

  <!-- Merge lines back -->
  <line x1="100" y1="300" x2="100" y2="355" stroke="#00b4d8" stroke-width="0.5"/>
  <line x1="500" y1="300" x2="500" y2="355" stroke="#7b2d8e" stroke-width="0.5"/>
  <line x1="800" y1="300" x2="800" y2="355" stroke="#2ecc71" stroke-width="0.5"/>
  <line x1="1075" y1="300" x2="1075" y2="355" stroke="#f0c040" stroke-width="0.5"/>
  <line x1="100" y1="355" x2="1075" y2="355" stroke="#00b4d8" stroke-width="0.3"/>
  <line x1="590" y1="355" x2="590" y2="385" stroke="#00b4d8" stroke-width="1"/>

  <!-- VERIFICATION node -->
  <rect x="520" y="385" width="140" height="45" rx="8" fill="#0a1e33" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="590" y="408" text-anchor="middle" fill="#2ecc71" font-size="13" font-weight="bold">VERIFY</text>
  <text x="590" y="422" text-anchor="middle" fill="#6688aa" font-size="8">Source · Math · Status</text>

  <line x1="590" y1="430" x2="590" y2="460" stroke="#2ecc71" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="520" y="460" width="140" height="35" rx="6" fill="#0a2e1a" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="590" y="482" text-anchor="middle" fill="#2ecc71" font-size="13" font-weight="bold">RESPONSE</text>

  <!-- ===== MIDDLE: SUBAGENT FLEET ===== -->
  <line x1="600" y1="510" x2="600" y2="540" stroke="#334466" stroke-width="0.5"/>
  <text x="600" y="535" text-anchor="middle" fill="#5577aa" font-size="10" font-style="italic">delegate_task spawns up to 3 concurrent subagents</text>

  <!-- 3 subagent boxes -->
  <rect x="80" y="555" width="310" height="140" rx="8" fill="#0a1e33" stroke="#2ecc71" stroke-width="1"/>
  <text x="235" y="578" text-anchor="middle" fill="#2ecc71" font-size="13" font-weight="bold">Subagent 1</text>
  <text x="235" y="598" text-anchor="middle" fill="#8899aa" font-size="10">Goal &amp; Context &amp; Toolset</text>
  <line x1="110" y1="610" x2="360" y2="610" stroke="#2ecc71" stroke-width="0.3"/>
  <text x="235" y="628" text-anchor="middle" fill="#66cc88" font-size="10">Reasoning · Review · Research</text>
  <text x="235" y="648" text-anchor="middle" fill="#66cc88" font-size="10">→ Summary + Verification artifact</text>
  <rect x="110" y="660" width="250" height="18" rx="3" fill="#1a2e1a" stroke="#2ecc71" stroke-width="0.3"/>
  <text x="235" y="673" text-anchor="middle" fill="#558866" font-size="7">Must verify external side effects before done</text>

  <rect x="445" y="555" width="310" height="140" rx="8" fill="#0a1e33" stroke="#2ecc71" stroke-width="1"/>
  <text x="600" y="578" text-anchor="middle" fill="#2ecc71" font-size="13" font-weight="bold">Subagent 2</text>
  <text x="600" y="598" text-anchor="middle" fill="#8899aa" font-size="10">Goal &amp; Context &amp; Toolset</text>
  <line x1="475" y1="610" x2="725" y2="610" stroke="#2ecc71" stroke-width="0.3"/>
  <text x="600" y="628" text-anchor="middle" fill="#66cc88" font-size="10">Debugging · Code review · Analysis</text>
  <text x="600" y="648" text-anchor="middle" fill="#66cc88" font-size="10">→ Summary + Verification artifact</text>
  <rect x="475" y="660" width="250" height="18" rx="3" fill="#1a2e1a" stroke="#2ecc71" stroke-width="0.3"/>
  <text x="600" y="673" text-anchor="middle" fill="#558866" font-size="7">Must include URLs, paths, HTTP status or proof</text>

  <rect x="810" y="555" width="310" height="140" rx="8" fill="#0a1e33" stroke="#2ecc71" stroke-width="1"/>
  <text x="965" y="578" text-anchor="middle" fill="#2ecc71" font-size="13" font-weight="bold">Subagent 3</text>
  <text x="965" y="598" text-anchor="middle" fill="#8899aa" font-size="10">Goal &amp; Context &amp; Toolset</text>
  <line x1="840" y1="610" x2="1090" y2="610" stroke="#2ecc71" stroke-width="0.3"/>
  <text x="965" y="628" text-anchor="middle" fill="#66cc88" font-size="10">Research · Investigation · Audit</text>
  <text x="965" y="648" text-anchor="middle" fill="#66cc88" font-size="10">→ Summary + Verification artifact</text>
  <rect x="840" y="660" width="250" height="18" rx="3" fill="#1a2e1a" stroke="#2ecc71" stroke-width="0.3"/>
  <text x="965" y="673" text-anchor="middle" fill="#558866" font-size="7">Returns proof not claims</text>

  <!-- Constraint card below fleet -->
  <rect x="80" y="715" width="1040" height="50" rx="6" fill="#1a0a0a" stroke="#cc3333" stroke-width="1"/>
  <text x="600" y="736" text-anchor="middle" fill="#cc6666" font-size="12" font-weight="bold">SUBAFENT CONSTRAINTS</text>
  <text x="600" y="754" text-anchor="middle" fill="#aa5555" font-size="10">Leaf workers only · Isolated context · Cannot delegate further · Cannot see other subagents · Return summary only</text>

  <!-- ===== BOTTOM: CONSTRAINT CARDS ===== -->
  <!-- VERIFICATION card -->
  <rect x="30" y="795" width="360" height="170" rx="8" fill="#0a1e33" stroke="#2ecc71" stroke-width="1"/>
  <rect x="30" y="795" width="360" height="28" rx="8" fill="#0a2e1a"/>
  <text x="210" y="814" text-anchor="middle" fill="#2ecc71" font-size="13" font-weight="bold">VERIFICATION LAYER</text>
  <text x="55" y="848" fill="#8899aa" font-size="11">Before final response:</text>
  <text x="55" y="870" fill="#66cc88" font-size="10">✓ Source exists and is accessible</text>
  <text x="55" y="888" fill="#66cc88" font-size="10">✓ Math is correct and formula matched</text>
  <text x="55" y="906" fill="#66cc88" font-size="10">✓ Tool succeeded with valid exit code</text>
  <text x="55" y="924" fill="#66cc88" font-size="10">✓ Connector returned valid structured data</text>
  <text x="55" y="942" fill="#66cc88" font-size="10">✓ Timestamp is current, not stale</text>
  <text x="55" y="960" fill="#66cc88" font-size="10">✓ Side effects actually happened</text>

  <!-- GOVERNANCE card -->
  <rect x="420" y="795" width="360" height="170" rx="8" fill="#0a1e33" stroke="#f0c040" stroke-width="1"/>
  <rect x="420" y="795" width="360" height="28" rx="8" fill="#1a1a0a"/>
  <text x="600" y="814" text-anchor="middle" fill="#f0c040" font-size="13" font-weight="bold">GOVERNANCE LAYER</text>
  <text x="445" y="848" fill="#8899aa" font-size="11">Before execution:</text>
  <text x="445" y="870" fill="#ccaa44" font-size="10">◈ Permission — is this allowed?</text>
  <text x="445" y="888" fill="#ccaa44" font-size="10">◈ Scope — within agent's domain?</text>
  <text x="445" y="906" fill="#ccaa44" font-size="10">◈ Intent — matches user's actual ask?</text>
  <text x="445" y="924" fill="#ccaa44" font-size="10">◈ Authority — data source authoritative?</text>
  <text x="445" y="942" fill="#ccaa44" font-size="10">◈ Audit log — recorded for review?</text>
  <text x="445" y="960" fill="#ccaa44" font-size="10">◈ Risk — should this be escalated?</text>

  <!-- DECISION card -->
  <rect x="810" y="795" width="360" height="170" rx="8" fill="#0a1e33" stroke="#00b4d8" stroke-width="1"/>
  <rect x="810" y="795" width="360" height="28" rx="8" fill="#0a1a2e"/>
  <text x="990" y="814" text-anchor="middle" fill="#00b4d8" font-size="13" font-weight="bold">DECISION LOGIC</text>
  <text x="835" y="848" fill="#8899aa" font-size="11">Routing table:</text>
  <text x="835" y="870" fill="#66aacc" font-size="10">Single call, no logic? → Direct</text>
  <text x="835" y="888" fill="#aa77cc" font-size="10">Scripting, parsing, loop? → execute_code</text>
  <text x="835" y="906" fill="#66cc88" font-size="10">Reasoning, review, research? → delegate</text>
  <text x="835" y="924" fill="#f0c040" font-size="10">Schedule, monitor, watchdog? → cron/bg</text>
  <text x="835" y="948" fill="#6688aa" font-size="10">Key questions:</text>
  <text x="835" y="964" fill="#5577aa" font-size="9">"Is the answer in one tool call?"</text>

  <!-- ===== FOOTER ===== -->
  <line x1="100" y1="1000" x2="1100" y2="1000" stroke="#334466" stroke-width="0.5"/>

  <!-- Callout -->
  <rect x="250" y="1020" width="700" height="45" rx="8" fill="#1a1a0a" stroke="#f0c040" stroke-width="1"/>
  <text x="600" y="1048" text-anchor="middle" fill="#f0c040" font-size="14" font-style="italic">Hermes is not powerful because it has subagents.</text>
  <text x="600" y="1060" text-anchor="middle" fill="#f0c040" font-size="14" font-style="italic">Hermes is powerful because it knows when not to use them.</text>

  <!-- Footer line -->
  <text x="600" y="1095" text-anchor="middle" fill="#334466" font-size="10">Hermes corpusiq-agent profile · Orchestration patterns · Observed 2026-06-13</text>

</svg>